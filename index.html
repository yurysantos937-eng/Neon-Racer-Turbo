<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Neon Racer Turbo</title>
  <link rel="stylesheet" href="estilo.css" />
</head>
<body>
  <div class="game-wrap" id="game-wrap">

    <div class="subway-start" id="subway-start">

      <div class="garage-screen" id="garage-screen">

        <div class="garage-top">
          <button class="garage-back" id="garage-back">←</button>
          <h2>GARAGEM</h2>
        </div>

        <div class="garage-preview">
          <div class="garage-car-glow"></div>

          <div class="garage-car" id="garage-car">
            <div class="f1-body"></div>
            <div class="f1-wing front"></div>
            <div class="f1-wing rear"></div>
            <div class="wheel w1"></div>
            <div class="wheel w2"></div>
            <div class="wheel w3"></div>
            <div class="wheel w4"></div>
            <div class="cockpit"></div>
          </div>
        </div>

        <div class="palette-wrapper">
          <button class="palette-toggle" id="palette-toggle">🎨 CORES</button>

          <div class="garage-palettes" id="garage-palettes">
            <button class="garage-color active" data-color="#2ee6a6" style="--c:#2ee6a6;"></button>
            <button class="garage-color" data-color="#00d0ff" style="--c:#00d0ff;"></button>
            <button class="garage-color" data-color="#ff5577" style="--c:#ff5577;"></button>
            <button class="garage-color" data-color="#ffd54a" style="--c:#ffd54a;"></button>
            <button class="garage-color" data-color="#b26cff" style="--c:#b26cff;"></button>
            <button class="garage-color" data-color="#ffffff" style="--c:#ffffff;"></button>
            <button class="garage-color" data-color="#ff8800" style="--c:#ff8800;"></button>
            <button class="garage-color" data-color="#00ff99" style="--c:#00ff99;"></button>
          </div>
        </div>
      </div>

      <div class="subway-bg"></div>

      <div class="subway-logo">
        <h1>NEON RACER</h1>
        <span>ULTIMATE</span>
      </div>

      <div class="subway-center">
        <div class="tap-play" id="tap-play">TOQUE PARA JOGAR</div>

        <div class="subway-buttons">
          <button class="sub-btn">🏆 MISSÕES</button>
          <button class="sub-btn" id="open-garage">🚗 GARAGEM</button>
          <button class="sub-btn">⚙️ CONFIG</button>
        </div>
      </div>
    </div>

    <canvas id="game"></canvas>

    <audio id="bgm" loop preload="none">
      <source src="https://cdn.pixabay.com/download/audio/2021/11/09/audio_3a71e0d6b7.mp3?filename=cyberpunk-moonlight-20854.mp3" type="audio/mpeg">
    </audio>

    <div class="hud">
      <div class="hud-top">

        <div class="pill hud-card score-pill">
          <div class="hud-icon">🏁</div>
          <div class="hud-info">
            <span class="muted">PONTOS</span>
            <span id="score" class="hud-value">0</span>
          </div>
        </div>

        <div class="pill hud-card speed-pill">
          <div class="hud-icon">⚡</div>
          <div class="hud-info">
            <span class="muted">VELOCIDADE</span>
            <span id="speed" class="hud-value">0</span>
          </div>
        </div>

        <div class="pill hud-card best-pill">
          <div class="hud-icon">⭐</div>
          <div class="hud-info">
            <span class="muted">RECORDE</span>
            <span id="best" class="hud-value">0</span>
          </div>
        </div>

        <div class="pill hud-card money-pill">
          <div class="hud-icon money-icon">🪙</div>
          <div class="hud-info">
            <span class="muted">COINS</span>
            <span id="money" class="hud-value">0</span>
          </div>
        </div>

        <div class="badge power-card" id="nitro-badge" style="opacity:.5;">
          <span class="dot nitro"></span>
          <div class="hud-info">
            <span>Nitro</span>
            <span id="nitro-time" class="muted">0.0s</span>
          </div>
        </div>

        <div class="badge power-card" id="shield-badge" style="opacity:.5;">
          <span class="dot shield"></span>
          <div class="hud-info">
            <span>Escudo</span>
            <span id="shield-time" class="muted">—</span>
          </div>
        </div>

        <div class="pill hud-card">
          <div class="hud-icon">🌤️</div>
          <div class="hud-info">
            <span class="muted">CLIMA</span>
            <span id="weather" class="hud-value">limpo</span>
          </div>
        </div>

        <div class="pill hud-card">
          <div class="hud-icon">🕑</div>
          <div class="hud-info">
            <span class="muted">HORÁRIO</span>
            <span id="tod" class="hud-value">dia</span>
          </div>
        </div>

        <button id="btn-sound">🔊 Som</button>
      </div>
    </div>

    <div class="controls">
      <div class="control-btn" id="btn-left">◀</div>
      <div class="control-btn" id="btn-right">▶</div>
    </div>

    <div class="game-menu">
      <button class="menu-btn" id="menu-btn">☰</button>

      <div class="menu-options" id="menu-options">
        <button class="menu-item" id="btn-pause">⏸ Pausar</button>
        <button class="menu-item" id="btn-home">🏠 Início</button>
        <button class="menu-item danger" id="btn-restart">↻ Reiniciar</button>
      </div>
    </div>

    <div class="overlay" id="start-overlay">
      <div class="card">
        <h1>🏎️ Neon Racer — Turbo</h1>
        <p>Desvie dos carros, colete power-ups e marque pontos.</p>

        <div class="row">
          <button class="btn primary" id="start-play">Começar</button>
          <button class="btn" id="start-muted">Silenciar</button>
        </div>
      </div>
    </div>

    <div class="overlay" id="gameover-overlay" style="display:none;">
      <div class="card">
        <h1>💥 Fim de Jogo</h1>
        <p>Pontuação: <strong id="final-score">0</strong> • Recorde: <strong id="final-best">0</strong></p>

        <div class="row">
          <button class="btn primary" id="again">Jogar de novo</button>
          <button class="btn" id="share">Compartilhar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
